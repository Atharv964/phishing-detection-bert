<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* main card */

.container{
width:500px;
padding:40px;
border-radius:15px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

/* title */

h1{
font-size:28px;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#ccc;
margin-bottom:30px;
}

/* input box */

input{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-bottom:20px;
font-size:16px;
outline:none;
}

/* button */

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
background:#00c6ff;
background: linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(0,114,255,0.7);
}

/* result box */

.result{
margin-top:25px;
padding:15px;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.safe{
background:#1f8b4c;
}

.phishing{
background:#b22222;
}

</style>
</head>


<body>

<div class="container">

<h1>🔐 Phishing URL Detector</h1>

<p class="subtitle">
AI Powered Cybersecurity Detection System
</p>

<form action="/predict" method="post">

<input type="text" name="url" placeholder="Enter URL to check..." required>

<button type="submit">Analyze URL</button>

</form>


{% if prediction %}

<div class="result 
{% if 'Phishing' in prediction %} phishing {% else %} safe {% endif %}">

{{ prediction }}

</div>
gfytr
{% endif %}

</div>

</body>
</html>
